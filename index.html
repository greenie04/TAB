  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Tomorrow's Trentham Card</p>
        <h1>Manawatu RC at Trentham</h1>
        <p class="lede">
          Simple race-day view with refreshed race times and predicted 1st and
          2nd for each race.
        </p>
        <div class="hero-actions">
          <button id="refresh-data" type="button">Refresh Predictions</button>
          <span id="data-status">Loading latest card...</span>
        </div>
      </header>

      <section class="summary-card">
        <div id="meeting-summary"></div>
      </section>

      <section class="table-card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Race</th>
              <th>Time</th>
              <th>Prediction</th>
            </tr>
          </thead>
          <tbody id="race-body"></tbody>
        </table>
      </section>

      <section class="sources-card">
        <p class="eyebrow">Sources</p>
        <div id="sources"></div>
      </section>
    </main>
